[pytest]
asyncio_default_fixture_loop_scope = function

addopts = -vvvv --tb=long -m "not integration"

markers =
    integration: needs external infra (MySQL / NATS); excluded from default collection. Run via `pytest -m integration` in a workflow that brings the infra up.

log_cli = 1
log_cli_level = INFO
; log_cli_level = DEBUG
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
