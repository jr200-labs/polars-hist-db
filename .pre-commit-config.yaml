repos:
  - repo: local
    hooks:
      - id: sync-shared
        name: sync shared configs
        entry: bash -c 'mkdir -p .shared && curl -sfL "https://raw.githubusercontent.com/jr200-labs/github-action-templates/master/shared/sync.sh" -o .shared/sync.sh && chmod +x .shared/sync.sh && ./.shared/sync.sh python'
        language: system
        always_run: true
        pass_filenames: false

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.16.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - sqlalchemy>=2.0.48
          - types-pyyaml>=6.0.12.20250822
          - types-pytz>=2025.2.0.20250326
          - types-python-dateutil>=2.9.0.20250822
          - pyarrow-stubs>=20.0.0.20251107
        pass_filenames: false

  - repo: https://github.com/alessandrojcm/commitlint-pre-commit-hook
    rev: v9.22.0
    hooks:
      - id: commitlint
        stages: [commit-msg]
        additional_dependencies: ['@commitlint/config-conventional']
