name: integration-tests

# Bespoke integration test runner — JRL-33 convention. Runs the
# pytest -m integration subset (split out in #36) against real
# MariaDB + NATS so the suite has somewhere to actually execute.
#
# Reference shape for other repos that need to wire bespoke
# integration tests; see github-action-templates/AGENTS.md
# "integration-tests workflow checklist".

on:
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  integration:
    runs-on: ${{ fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}

    services:
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: admin
          MARIADB_AUTO_UPGRADE: "1"
        ports:
          - 13307:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=20

    env:
      MARIADB_PORT: "13307"
      NATS_PORT: "14222"

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Mint App token (private git deps)
        id: git-auth
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ vars.INTEGRATION_CLIENT_ID }}
          private-key: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Write netrc for private git deps
        run: |
          printf 'machine github.com\nlogin x-access-token\npassword %s\n' \
            "${{ steps.git-auth.outputs.token }}" > ~/.netrc
          chmod 600 ~/.netrc

      - name: Install nats-server (started by tests via subprocess)
        env:
          NATS_VERSION: v2.12.7
        run: |
          curl -sSL "https://github.com/nats-io/nats-server/releases/download/${NATS_VERSION}/nats-server-${NATS_VERSION}-linux-amd64.tar.gz" \
            | tar -xz -C /tmp
          sudo install "/tmp/nats-server-${NATS_VERSION}-linux-amd64/nats-server" /usr/local/bin/nats-server
          nats-server --version

      - name: Sync deps
        run: uv sync --group dev

      - name: Run integration tests
        run: uv run pytest -m integration -v
