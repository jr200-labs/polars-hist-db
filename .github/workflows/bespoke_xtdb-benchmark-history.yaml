name: xtdb-benchmark-history

on:
  push:
    branches: [master]
    paths:
      - 'benchmarks/xtdb_delta.py'
      - 'benchmarks/record_history.py'
      - 'polars_hist_db/backends/xtdb.py'
      - 'polars_hist_db/loaders/input_source.py'
      - '.github/workflows/bespoke_xtdb-benchmark-history.yaml'
      - 'pyproject.toml'
      - 'uv.lock'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: xtdb-benchmark-history
  cancel-in-progress: false

jobs:
  benchmark:
    runs-on: ${{ fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    steps:
      - name: Mint app token
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ vars.INTEGRATION_CLIENT_ID }}
          private-key: ${{ secrets.INTEGRATION_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
          permission-pull-requests: write

      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: astral-sh/setup-uv@v9.0.0

      - run: uv sync --group dev

      - name: Run benchmarks
        run: >-
          uv run python benchmarks/xtdb_delta.py
          --target-rows 50000,500000,5000000
          --upload-rows 50000
          --value-columns 8
          --repeats 3
          --fk-match-fractions 0,0.5,1
          --partition-rows 500000
          --partition-buckets 365
          --json-output benchmark-results.json

      - name: Record benchmark history
        run: >-
          uv run python benchmarks/record_history.py
          benchmark-results.json docs/benchmark-history.json
          --commit "$GITHUB_SHA"
          --repository "$GITHUB_REPOSITORY"
          --runner "$RUNNER_OS/$RUNNER_ARCH"

      - name: Create benchmark history PR
        id: create-pull-request
        uses: peter-evans/create-pull-request@v8.1.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          branch: chore/benchmark-history
          delete-branch: true
          add-paths: docs/benchmark-history.json
          commit-message: "chore: update benchmark history"
          title: "chore: update benchmark history"
          body: |
            ## Summary
            - Record the latest ingestion benchmark results.

      - name: Enable auto-merge for benchmark history PR
        if: steps.create-pull-request.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pull-request.outputs.pull-request-number }}
        run: |
          set -euo pipefail
          test "$(gh pr view "${PR_NUMBER}" --json headRefName --jq .headRefName)" = "chore/benchmark-history"
          test "$(gh pr view "${PR_NUMBER}" --json files --jq '.files[].path')" = "docs/benchmark-history.json"
          gh pr merge "${PR_NUMBER}" --squash --auto --delete-branch # lint-no-auto-merge:allow
