name: build-quarto-docs

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  build-quarto-docs:
    uses: jr200-labs/github-action-templates/.github/workflows/build_quarto_docs.yaml@master
    with:
      checkout-ref: ${{ github.ref }}
      site-path: docs
      runner: ${{ fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
