# GENERATED/SHARED WORKFLOW: copied into consuming repos by sync-shared.
# Do not edit in consuming repos; change jr200-labs/github-action-templates and sync.
name: publish-wheel

# Triggered by release-please publishing a tag. Builds the wheel and
# uploads to PyPI via uv publish. Verbatim across consumers; each
# consumer must set the PYPI_API_TOKEN secret.

on:
  repository_dispatch:
    types: [release-published]
  workflow_dispatch:
    inputs:
      runner:
        description: Runner pool
        required: false
        type: choice
        default: configured
        options:
          - configured
          - self-hosted
          - github-hosted
      checkout-ref:
        description: "checkout ref"
        required: false
        type: string
        default: "refs/heads/master"

permissions:
  contents: read

jobs:
  configure:
    uses: jr200-labs/github-action-templates/.github/workflows/preconfigure.yaml@master
    with:
      event_name: ${{ toJson(github.event_name) }}
      event: ${{ toJson(github.event) }}
      runner: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.runner == 'self-hosted' && 'self-hosted' || github.event_name == 'workflow_dispatch' && github.event.inputs.runner == 'github-hosted' && 'ubuntu-latest' || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}

  main:
    needs: configure
    uses: jr200-labs/github-action-templates/.github/workflows/publish_uv_pypi.yaml@master
    with:
      checkout-ref: ${{ fromJson(needs.configure.outputs.context).checkout-ref }}
      runner: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.runner == 'self-hosted' && 'self-hosted' || github.event_name == 'workflow_dispatch' && github.event.inputs.runner == 'github-hosted' && 'ubuntu-latest' || fromJSON(vars.RUNNER_PROFILES)[vars.RUNNER_PROFILE].default }}
    secrets:
      pypi_api_token: ${{ secrets.PYPI_API_TOKEN }}
